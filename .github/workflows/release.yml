name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Test
        run: dotnet test --configuration Release

      - name: Publish
        run: dotnet publish src/IntuneSimulator.Host/IntuneSimulator.Host.csproj --configuration Release --output ./publish

      - name: Zip artifacts
        run: cd publish && zip -r ../IntuneSimulator-${{ github.ref_name }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: IntuneSimulator-${{ github.ref_name }}.zip
          body_path: RELEASE-NOTES.md
          generate_release_notes: true
